name: DB Migration

on:
  pull_request_review:
    types:
      - submitted
    branches:
      - develop
      - main

jobs:
  migrate:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Select database URL by target branch
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "develop" ]; then
            echo "DATABASE_URL=${{ secrets.NEON_DEV_DATABASE_URL }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            echo "DATABASE_URL=${{ secrets.NEON_PROD_DATABASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "Unsupported target branch: ${{ github.event.pull_request.base.ref }}"
            exit 1
          fi

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: alembic upgrade head
