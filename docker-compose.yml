version: '3.9'

services:
  chromadb:
    image: chromadb/chroma
    container_name: ajou_vector_db
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/index_data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/index_data
      - CHROMA_SERVER_AUTH_PROVIDER=
      - ALLOW_RESET=TRUE